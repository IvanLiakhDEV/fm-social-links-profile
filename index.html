<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta
            name="viewport"
            content="width=device-width, initial-scale=1.0" />
        <link
            rel="icon"
            type="image/png"
            sizes="32x32"
            href="assets/images/favicon-32x32.png" />
        <link
            rel="stylesheet"
            href="css/style.css" />
        <title>Frontend Mentor | Social links profile</title>
    </head>
    <body>
        <main>
            <article class="profile-container profile">
                <div class="profile-wrapper">
                    <header class="profile__header">
                        <img
                            src="./assets/images/avatar-jessica.jpeg"
                            class="profile__img"
                            alt="avatar" />
                        <div class="profile__info">
                            <div class="profile__name-address">
                                <h1 class="profile__name">Jessica Randall</h1>
                                <p class="profile__address">London, United Kingdom</p>
                            </div>
                            <p class="profile__description">"Front-end developer and avid reader."</p>
                        </div>
                    </header>
                    <ul class="links-list">
                        <li class="links-list__item">
                            <a
                                href="#"
                                class="link"
                                >GitHub</a
                            >
                        </li>

                        <li class="links-list__item">
                            <a
                                href="#"
                                class="link"
                                >Frontend Mentor</a
                            >
                        </li>
                        <li class="links-list__item">
                            <a
                                href="#"
                                class="link"
                                >LinkedIn</a
                            >
                        </li>
                        <li class="links-list__item">
                            <a
                                href="#"
                                class="link"
                                >Twitter</a
                            >
                        </li>
                        <li class="links-list__item">
                            <a
                                href="#"
                                class="link"
                                >Instagram</a
                            >
                        </li>
                    </ul>
                </div>
            </article>
        </main>
    </body>
</html>
